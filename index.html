<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Expense Tracker App - Track your daily expenses in Nigerian Naira">
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <header class="app-header">
      <h1 class="app-title">Expense Tracker</h1>
      <p class="app-subtitle">Track your daily expenses in Naira (₦)</p>
    </header>

    <section class="card form-card" aria-label="Add new expense">
      <h2 class="section-title">Add Expense</h2>
      <form id="expense-form" novalidate>
        <div class="form-group">
          <label for="expense-date">Date</label>
          <input type="date" id="expense-date" name="date" required>
          <span class="error-message" id="date-error" role="alert"></span>
        </div>
        <div class="form-group">
          <label for="expense-name">Expense Name</label>
          <input type="text" id="expense-name" name="name" placeholder="e.g. Transport, Food, Data" autocomplete="off" required>
          <span class="error-message" id="name-error" role="alert"></span>
        </div>
        <div class="form-group">
          <label for="expense-amount">Amount (₦)</label>
          <input type="text" id="expense-amount" name="amount" placeholder="e.g. 2500" inputmode="numeric" autocomplete="off" required>
          <span class="error-message" id="amount-error" role="alert"></span>
        </div>
        <button type="submit" id="add-btn">Add Expense</button>
      </form>
    </section>

    <section class="card list-card" aria-label="Expense list">
      <h2 class="section-title">Expenses</h2>
      <div id="expense-list" class="expense-list">
        <div class="empty-state" id="empty-state">
          <p>No expenses added yet.</p>
        </div>
      </div>
    </section>

    <section class="card total-card" aria-label="Total expenses">
      <h2 class="section-title">Total Expenses</h2>
      <div id="total-amount" class="total-amount">₦0</div>
      <button id="save-day-btn" disabled>Save Day</button>
    </section>

    <section class="card history-card" aria-label="Saved history">
      <h2 class="section-title">History</h2>
      <div id="history-list">
        <div class="empty-state">No saved days yet.</div>
      </div>
    </section>
  </main>

  <div class="modal-overlay" id="success-modal" hidden>
    <div class="modal-content success-content">
      <div class="checkmark-container">
        <svg class="checkmark" viewBox="0 0 52 52">
          <circle class="checkmark-circle" cx="26" cy="26" r="25" fill="none"/>
          <path class="checkmark-check" fill="none" d="M14 27l7 7 16-16"/>
        </svg>
      </div>
      <h2 class="modal-heading">Successfully Tracked</h2>
      <p class="modal-text">Your expenses have been saved for today.</p>
      <button class="modal-btn" id="close-success-btn">Done</button>
    </div>
  </div>

  <div class="modal-overlay" id="detail-modal" hidden>
    <div class="modal-content detail-content">
      <h2 class="modal-heading" id="detail-date-heading"></h2>
      <div id="detail-expenses"></div>
      <div class="detail-total" id="detail-total">Total: ₦0</div>
      <button class="modal-btn" id="close-detail-btn">Close</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
